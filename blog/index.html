<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Blog — Vortex AI Agents</title>
  <meta name="description" content="AI agents, local business automation, and digital workforce insights from Vortex AI Agents in The Woodlands, TX."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080a0f;--surface:#0d1117;--surface2:#141920;--border:rgba(255,255,255,0.07);--green:#00ff88;--white:#f0f4f8;--muted:rgba(240,244,248,0.45);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}

    /* Nav */
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,10,15,0.95);backdrop-filter:blur(12px);z-index:100;}
    .logo{font-weight:700;font-size:1.1rem;color:var(--white);text-decoration:none;}
    .logo span{color:var(--green);}
    .nav-links{display:flex;gap:1.5rem;align-items:center;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--white);}
    .cta-btn{background:var(--green);color:#080a0f;padding:.5rem 1.2rem;border-radius:6px;font-weight:600;font-size:.85rem;text-decoration:none;transition:opacity .2s;}
    .cta-btn:hover{opacity:.85;}

    /* Hero */
    .blog-hero{padding:4rem 2rem 2.5rem;max-width:860px;margin:0 auto;}
    .blog-hero h1{font-size:2.2rem;font-weight:700;margin-bottom:.75rem;}
    .blog-hero h1 span{color:var(--green);}
    .blog-hero p{color:var(--muted);font-size:1.05rem;line-height:1.6;}

    /* Posts grid */
    .posts{max-width:860px;margin:0 auto;padding:0 2rem 4rem;}
    .post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem;margin-bottom:1.25rem;cursor:pointer;transition:border-color .2s,transform .2s;}
    .post-card:hover{border-color:rgba(0,255,136,0.3);transform:translateY(-2px);}
    .post-meta{font-size:.8rem;color:var(--muted);margin-bottom:.6rem;}
    .post-keyword{display:inline-block;background:rgba(0,255,136,0.1);color:var(--green);font-size:.75rem;padding:.2rem .6rem;border-radius:20px;margin-right:.5rem;}
    .post-card h2{font-size:1.2rem;font-weight:600;margin-bottom:.6rem;line-height:1.4;}
    .post-card p{color:var(--muted);font-size:.9rem;line-height:1.6;}
    .read-more{display:inline-block;margin-top:.9rem;color:var(--green);font-size:.85rem;font-weight:500;}

    /* Empty state */
    .empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
    .empty h2{font-size:1.3rem;margin-bottom:.5rem;color:var(--white);}

    /* Loading */
    .loading{text-align:center;padding:3rem;color:var(--muted);}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin:0 3px;animation:bounce .8s infinite;}
    .dot:nth-child(2){animation-delay:.15s;}
    .dot:nth-child(3){animation-delay:.3s;}
    @keyframes bounce{0%,80%,100%{transform:scale(1);}40%{transform:scale(1.4);}}

    footer{border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;color:var(--muted);font-size:.8rem;}
    footer a{color:var(--green);text-decoration:none;}
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">VORTEX <span>AI</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/blog" class="active">Blog</a>
    <a href="/#agents">Agents</a>
    <a href="/" class="cta-btn">Book a Demo</a>
  </div>
</nav>

<div class="blog-hero">
  <h1>Insights on <span>AI agents</span> for local business</h1>
  <p>Practical articles on automation, lead response, and digital workforce — from The Woodlands, TX.</p>
</div>

<div class="posts" id="posts">
  <div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>

<footer>
  © 2026 Vortex AI Agents · <a href="https://vortexagents.ai">vortexagents.ai</a> · The Woodlands, TX
</footer>

<script>
const API = 'https://api.vortexagents.ai/api/v1/blog/posts';

function fmt(iso){
  return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
}

async function loadPosts(){
  const container = document.getElementById('posts');
  try {
    const res = await fetch(API);
    const posts = await res.json();

    if (!posts.length){
      container.innerHTML = `<div class="empty"><h2>Coming soon</h2><p>New articles are published weekly. Check back soon.</p></div>`;
      return;
    }

    container.innerHTML = posts.map(p => `
      <div class="post-card" onclick="location.href='/blog/post.html?slug=${p.slug}'">
        <div class="post-meta">
          <span class="post-keyword">${p.keyword}</span>
          ${fmt(p.published_at)}
        </div>
        <h2>${p.title}</h2>
        <p>${p.excerpt}</p>
        <span class="read-more">Read article →</span>
      </div>
    `).join('');
  } catch(e){
    container.innerHTML = `<div class="empty"><h2>Could not load posts</h2><p>Please try again later.</p></div>`;
  }
}

loadPosts();
</script>
</body>
</html>
