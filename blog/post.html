<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title id="page-title">Blog — Vortex AI Agents</title>
  <meta name="description" id="page-desc" content="AI agents, local business automation, and digital workforce insights from Vortex AI Agents in The Woodlands, TX."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080a0f;--surface:#0d1117;--surface2:#141920;--border:rgba(255,255,255,0.07);--green:#00ff88;--white:#f0f4f8;--muted:rgba(240,244,248,0.45);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}

    /* Nav */
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,10,15,0.95);backdrop-filter:blur(12px);z-index:100;}
    .logo{font-weight:700;font-size:1.1rem;color:var(--white);text-decoration:none;}
    .logo span{color:var(--green);}
    .nav-links{display:flex;gap:1.5rem;align-items:center;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--white);}
    .cta-btn{background:var(--green);color:#080a0f;padding:.5rem 1.2rem;border-radius:6px;font-weight:600;font-size:.85rem;text-decoration:none;transition:opacity .2s;}
    .cta-btn:hover{opacity:.85;}

    /* Article */
    .article-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem 5rem;}
    .back-link{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;margin-bottom:2rem;transition:color .2s;}
    .back-link:hover{color:var(--green);}
    .post-meta{font-size:.8rem;color:var(--muted);margin-bottom:.75rem;}
    .post-keyword{display:inline-block;background:rgba(0,255,136,0.1);color:var(--green);font-size:.75rem;padding:.2rem .6rem;border-radius:20px;margin-right:.5rem;}
    h1.post-title{font-size:2rem;font-weight:700;line-height:1.3;margin-bottom:1.5rem;}

    /* Markdown body */
    .post-body{color:rgba(240,244,248,0.85);line-height:1.8;font-size:1rem;}
    .post-body h1,.post-body h2,.post-body h3{color:var(--white);margin:2rem 0 .75rem;line-height:1.3;}
    .post-body h1{font-size:1.6rem;}
    .post-body h2{font-size:1.3rem;}
    .post-body h3{font-size:1.1rem;color:var(--green);}
    .post-body p{margin-bottom:1rem;}
    .post-body ul,.post-body ol{margin:0 0 1rem 1.5rem;}
    .post-body li{margin-bottom:.4rem;}
    .post-body strong{color:var(--white);}
    .post-body em{color:var(--muted);}
    .post-body blockquote{border-left:3px solid var(--green);padding-left:1rem;margin:1.5rem 0;color:var(--muted);font-style:italic;}
    .post-body a{color:var(--green);text-decoration:none;}
    .post-body a:hover{text-decoration:underline;}
    .post-body hr{border:none;border-top:1px solid var(--border);margin:2rem 0;}

    /* CTA box */
    .post-cta{margin-top:3rem;background:var(--surface);border:1px solid rgba(0,255,136,0.2);border-radius:12px;padding:2rem;text-align:center;}
    .post-cta h3{font-size:1.2rem;margin-bottom:.5rem;}
    .post-cta p{color:var(--muted);font-size:.9rem;margin-bottom:1.25rem;}

    /* Loading */
    .loading{text-align:center;padding:4rem;color:var(--muted);}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin:0 3px;animation:bounce .8s infinite;}
    .dot:nth-child(2){animation-delay:.15s;}
    .dot:nth-child(3){animation-delay:.3s;}
    @keyframes bounce{0%,80%,100%{transform:scale(1);}40%{transform:scale(1.4);}}

    /* Error */
    .error{text-align:center;padding:4rem 2rem;color:var(--muted);}
    .error h2{color:var(--white);margin-bottom:.5rem;}

    footer{border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;color:var(--muted);font-size:.8rem;}
    footer a{color:var(--green);text-decoration:none;}
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">VORTEX <span>AI</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/blog" class="active">Blog</a>
    <a href="/#agents">Agents</a>
    <a href="/" class="cta-btn">Book a Demo</a>
  </div>
</nav>

<div class="article-wrap" id="content">
  <div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>

<footer>
  © 2026 Vortex AI Agents · <a href="https://vortexagents.ai">vortexagents.ai</a> · The Woodlands, TX
</footer>

<script>
const API = 'https://api.vortexagents.ai/api/v1/blog/posts';

function fmt(iso){
  return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
}

function getSlug(){
  return new URLSearchParams(window.location.search).get('slug') || '';
}

/* Very minimal Markdown → HTML (handles headings, bold, italic, lists, blockquotes, hr, links) */
function mdToHtml(md){
  if(!md) return '';
  let html = md
    // Headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold & italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // HR
    .replace(/^---$/gm, '<hr>')
    // Blockquotes
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Unordered lists (basic — wraps each item, no nested)
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Links
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, (m) => `<ul>${m}</ul>`);

  // Paragraphs: lines not already wrapped
  const lines = html.split('\n');
  const out = [];
  for(const line of lines){
    const t = line.trim();
    if(!t) continue;
    if(/^<(h[1-3]|ul|li|blockquote|hr|p)/.test(t)) out.push(t);
    else out.push(`<p>${t}</p>`);
  }
  return out.join('\n');
}

async function loadPost(){
  const container = document.getElementById('content');
  const slug = getSlug();

  if(!slug){
    container.innerHTML = `<div class="error"><h2>Post not found</h2><p>No slug provided.</p><a href="/blog" style="color:var(--green)">← Back to blog</a></div>`;
    return;
  }

  try{
    const res = await fetch(`${API}/${slug}`);
    if(!res.ok) throw new Error('Not found');
    const post = await res.json();

    // Update <title> and meta description
    document.getElementById('page-title').textContent = `${post.meta_title || post.title} — Vortex AI Agents`;
    document.getElementById('page-desc').setAttribute('content', post.meta_description || '');

    container.innerHTML = `
      <a href="/blog" class="back-link">← All articles</a>
      <div class="post-meta">
        <span class="post-keyword">${post.keyword}</span>
        ${fmt(post.published_at)}
      </div>
      <h1 class="post-title">${post.title}</h1>
      <div class="post-body">${mdToHtml(post.body)}</div>
      <div class="post-cta">
        <h3>Ready to automate your business?</h3>
        <p>DARA handles leads, appointments, and follow-ups — 24/7, bilingual, no code required.</p>
        <a href="/" class="cta-btn" style="display:inline-block;margin-top:.25rem;">Book a free demo →</a>
      </div>
    `;
  } catch(e){
    container.innerHTML = `<div class="error"><h2>Post not found</h2><p>This article may have been moved or removed.</p><a href="/blog" style="color:var(--green)">← Back to blog</a></div>`;
  }
}

loadPost();
</script>
</body>
</html>
