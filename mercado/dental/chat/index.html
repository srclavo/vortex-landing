<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bright Smile Dental · Demo Interactivo — Vortex AI Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f6f2ec;--bg2:#ede8e0;--bg3:#e5dfd5;
  --white:#fdfcfa;--bdr:#dbd4c8;--bdr2:#ccc3b4;
  --ink:#18120c;--ink2:#3d3020;--ink3:#7a6a55;--ink4:#b0a090;--ink5:#d5cdc0;
  --blue:#1a3d6b;--blue-d:rgba(26,61,107,.09);
  --serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:#e0d8cc;font-family:var(--sans);color:var(--ink)}

.phone{width:100%;height:100%;max-width:420px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.3)}

.sbar{display:flex;justify-content:space-between;align-items:center;padding:6px 16px 4px;background:var(--white);border-bottom:1px solid var(--bdr);flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--ink4)}
.sbar-brand{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--ink2)}

.appbar{background:var(--white);border-bottom:1px solid var(--bdr);padding:10px 14px;flex-shrink:0}
.appbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:10px;font-weight:700}
.logo-name{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--ink)}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--ink4);margin-top:1px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:9px;color:var(--ink3)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:ld 1.8s ease-in-out infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.2}}

.agent-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.agent-tabs::-webkit-scrollbar{display:none}
.agent-tab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;flex-shrink:0;font-family:var(--mono);font-size:9px;cursor:pointer;border:1px solid var(--bdr);background:var(--bg);color:var(--ink4);transition:all .2s}
.agent-tab.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
.agent-tab-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6}

.chat-hdr{padding:9px 14px;border-bottom:1px solid var(--bdr);background:var(--white);flex-shrink:0;display:flex;align-items:center;gap:9px}
.chat-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid var(--bdr);background:var(--bg2)}
.chat-name{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink)}
.chat-sub{font-size:10px;color:var(--ink4);font-family:var(--mono)}
.chat-tag{margin-left:auto;font-family:var(--mono);font-size:8.5px;color:var(--ink4);background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:2px 8px;white-space:nowrap}

.ctx-banner{padding:6px 14px;border-bottom:1px solid var(--bdr);background:var(--bg);flex-shrink:0;font-family:var(--mono);font-size:9px;color:var(--ink3);display:flex;align-items:center;gap:7px}
.ctx-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}

.msgs{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:9px;scrollbar-width:none}
.msgs::-webkit-scrollbar{display:none}

.msg{display:flex;gap:7px}
.msg.r{flex-direction:row-reverse}
.msg-enter{animation:mup .28s ease forwards;opacity:0;transform:translateY(6px)}
@keyframes mup{to{opacity:1;transform:translateY(0)}}

.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid var(--bdr);background:var(--bg2)}
.mcont{max-width:82%;display:flex;flex-direction:column;gap:3px}
.msg.r .mcont{align-items:flex-end}
.msender{font-family:var(--mono);font-size:8px;color:var(--ink5);padding:0 2px}

.mb{padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.58;border:1px solid var(--bdr)}
.msg.r .mb{background:var(--ink);color:#f0ece6;border-radius:12px 2px 12px 12px;border-color:var(--ink)}
.msg.l .mb{background:var(--white);border-radius:2px 12px 12px 12px}

.agent-badge{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:20px;border:1px solid var(--blue);color:var(--blue);background:var(--blue-d);display:inline-flex;align-items:center;gap:3px}
.sys-note{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink4);background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;width:100%}

.typing-wrap{display:flex;gap:7px;align-items:flex-end}
.typing-bubble{padding:10px 14px;border-radius:2px 12px 12px 12px;background:var(--white);border:1px solid var(--bdr)}
.typing-dots{display:flex;gap:4px;align-items:center}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--ink4);animation:bounce .9s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.suggestions{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;border-top:1px solid var(--bdr);background:var(--bg)}
.sug-btn{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid var(--bdr2);background:var(--white);color:var(--ink3);cursor:pointer;transition:all .2s;white-space:nowrap}
.sug-btn:hover{border-color:var(--blue);color:var(--blue)}

.input-bar{padding:10px 12px;background:var(--white);border-top:1px solid var(--bdr);flex-shrink:0;display:flex;gap:8px;align-items:flex-end;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
.input-field{flex:1;font-family:var(--sans);font-size:13px;border:1px solid var(--bdr);border-radius:20px;padding:9px 14px;background:var(--bg);color:var(--ink);outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4;scrollbar-width:none}
.input-field:focus{border-color:var(--bdr2)}
.input-field::-webkit-scrollbar{display:none}
.input-field::placeholder{color:var(--ink5)}
.send-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div class="phone">

  <div class="sbar">
    <span style="font-size:11px;font-weight:500;color:var(--ink2)" id="clockEl">9:14</span>
    <span class="sbar-brand">Bright Smile Dental</span>
    <span style="font-size:11px;color:var(--ink4)">📶 🔋</span>
  </div>

  <div class="appbar">
    <div class="appbar-top">
      <div class="logo">
        <div class="logo-mark">DM</div>
        <div>
          <div class="logo-name">Bright Smile Dental</div>
          <div class="logo-sub">Powered by Vortex AI Agents</div>
        </div>
      </div>
      <div class="live-pill"><div class="ldot"></div>En vivo · IA real</div>
    </div>
    <div class="agent-tabs" id="agentTabs"></div>
  </div>

  <div class="chat-hdr" id="chatHdr">
    <div class="chat-av" id="chatAv">🤖</div>
    <div style="flex:1;min-width:0">
      <div class="chat-name" id="chatName">Agente Bright Smile Dental</div>
      <div class="chat-sub" id="chatSub">Listo para atenderte</div>
    </div>
    <div class="chat-tag" id="chatTag">📲 Agente IA</div>
  </div>

  <div class="ctx-banner">
    <div class="ctx-dot"></div>
    <span id="ctxText">Escribe tu mensaje — el agente te responde en segundos</span>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="suggestions" id="suggestions"></div>

  <div class="input-bar">
    <textarea class="input-field" id="inputField" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>
<script>
const API_BASE = 'https://api.vortexagents.ai/api/v1';
const BUSINESS_ID = 'bright-smile-dental';
const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 10);

const AGENTS = [
  {
    id: 'supervisor',
    label: '🤖 Auto',
    av: '🦷', name: 'Bright Smile Dental', sub: 'Agent routes to the right specialist', tag: '🧠 Supervisor',
    ctx: 'The supervisor detects your intent and connects you with the right agent automatically',
    welcome: "Hi! Welcome to Bright Smile Dental in The Woodlands, TX 🦷\nHow can I help you? I can schedule appointments, answer questions, or anything else you need.",
    suggestions: ['How much is a dental cleaning?', 'I need to schedule an appointment', 'Do you accept Delta Dental?', '¿Hablan español?'],
  },
  {
    id: 'lead_response',
    label: '🎧 Lead',
    av: '🎧', name: 'Lead Response', sub: 'Converts inquiries into new patients', tag: '📲 SMS / Web',
    ctx: 'Act as a new patient asking about a dental treatment in The Woodlands',
    welcome: "Hi! I'm the patient care agent at Bright Smile Dental 🦷\nWhat treatment are you interested in? Tell me about your case and I'll guide you.",
    suggestions: ["I'm interested in teeth whitening", 'Found you searching for dentist in The Woodlands', 'Do you offer Invisalign?', 'I need a new patient appointment'],
  },
  {
    id: 'appointment',
    label: '📅 Appts',
    av: '📅', name: 'Appointment Scheduler', sub: 'Book appointments 24/7', tag: '📲 SMS / Web',
    ctx: 'Ask to schedule an appointment — cleaning, whitening, or emergency',
    welcome: "Hi! I can book your appointment at Bright Smile Dental 📅\nWhat treatment do you need and when works best for you?",
    suggestions: ['I need a cleaning this week', 'Do you have appointments today?', 'I want to schedule a whitening consultation', 'Are you open on Saturdays?'],
  },
  {
    id: 'faq',
    label: '📋 FAQ',
    av: '📋', name: 'FAQ Agent', sub: 'Answers from the knowledge base', tag: '💬 Web Chat',
    ctx: 'Ask about prices, insurance, hours, or any question about the practice',
    welcome: "Hi! I'm the FAQ agent at Bright Smile Dental 📋\nAsk me anything — prices, insurance, hours, treatments.",
    suggestions: ['How much is teeth whitening?', 'Do you accept MetLife?', 'What are your hours?', 'Do you offer CareCredit?'],
  },
  {
    id: 'bilingual_chat',
    label: '💠 EN+ES',
    av: '💠', name: 'Chat Widget EN+ES', sub: 'The Woodlands TX · bilingual support', tag: '🌐 Web',
    ctx: 'Write in English or Spanish — the agent detects language automatically',
    welcome: "Hi! I'm Bright Smile Dental's bilingual assistant 🦷\nServing The Woodlands, TX — write in English or Spanish, I've got you covered.",
    suggestions: ['I need a dentist near The Woodlands', '¿Hablan español en la clínica?', 'What insurances do you take?', '¿Cuánto cuesta una limpieza?'],
  },
];

let currentAgent = AGENTS[0];
let isThinking = false;

(function startClock() {
  const base = new Date(); base.setHours(9, 14, 0, 0);
  setInterval(() => {
    base.setSeconds(base.getSeconds() + 1);
    const h = base.getHours(), m = String(base.getMinutes()).padStart(2, '0');
    document.getElementById('clockEl').textContent = h + ':' + m;
  }, 1000);
})();

function buildTabs() {
  const container = document.getElementById('agentTabs');
  AGENTS.forEach(ag => {
    const tab = document.createElement('div');
    tab.className = 'agent-tab' + (ag.id === currentAgent.id ? ' active' : '');
    tab.id = 'tab_' + ag.id;
    tab.innerHTML = `<div class="agent-tab-dot"></div>${ag.label}`;
    tab.onclick = () => switchAgent(ag);
    container.appendChild(tab);
  });
}

function switchAgent(ag) {
  if (ag.id === currentAgent.id) return;
  currentAgent = ag;
  document.querySelectorAll('.agent-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab_' + ag.id)?.classList.add('active');
  document.getElementById('chatAv').textContent = ag.av;
  document.getElementById('chatName').textContent = ag.name;
  document.getElementById('chatSub').textContent = ag.sub;
  document.getElementById('chatTag').textContent = ag.tag;
  document.getElementById('ctxText').textContent = ag.ctx;
  const msgs = document.getElementById('msgs');
  msgs.innerHTML = '';
  addSys('— Cambiando a ' + ag.name + ' —');
  addAgentMsg(ag.welcome, ag);
  buildSuggestions(ag);
}

function buildSuggestions(ag) {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  ag.suggestions.forEach(text => {
    const btn = document.createElement('div');
    btn.className = 'sug-btn';
    btn.textContent = text;
    btn.onclick = () => { document.getElementById('inputField').value = text; sendMessage(); };
    container.appendChild(btn);
  });
}

function addUserMsg(text) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg r msg-enter';
  d.innerHTML = `<div class="mcont"><div class="mb">${escHtml(text).replace(/\n/g,'<br>')}</div></div><div class="mav">👤</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function addAgentMsg(text, ag, agentType) {
  const msgs = document.getElementById('msgs');
  const label = agentType ? agentTypeLabel(agentType) : ag.name;
  const d = document.createElement('div');
  d.className = 'msg l msg-enter';
  d.innerHTML = `<div class="mav">${ag.av}</div><div class="mcont"><div class="msender">${label}</div><div class="mb">${escHtml(text).replace(/\n/g,'<br>')}</div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function addSys(text) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = `<div class="sys-note">${text}</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'typing-wrap'; d.id = 'typingIndicator';
  d.innerHTML = `<div class="mav">${currentAgent.av}</div><div class="typing-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

function agentTypeLabel(type) {
  const map = {
    lead_response: 'Lead Response · Bright Smile Dental — The Woodlands',
    appointment: 'Appointment Scheduler · Bright Smile Dental — The Woodlands',
    review_response: 'Review Response · Bright Smile Dental — The Woodlands',
    faq: 'FAQ Agent · Bright Smile Dental — The Woodlands',
    bilingual_chat: 'Chat Widget · Bright Smile Dental — The Woodlands',
    followup: 'Follow-Up · Bright Smile Dental — The Woodlands',
    dara: 'DARA · Bright Smile Dental — The Woodlands',
    supervisor: 'Agente Bright Smile Dental',
  };
  return map[type] || ('Agente · ' + type);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendMessage() {
  const field = document.getElementById('inputField');
  const text = field.value.trim();
  if (!text || isThinking) return;
  field.value = ''; field.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  addUserMsg(text);
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/demo/${BUSINESS_ID}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID + '_' + currentAgent.id }),
    });
    hideTyping();
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addSys(res.status === 429 ? '⏳ Límite de demo alcanzado — intenta en un minuto' : '⚠️ Error ' + res.status + ': ' + (err.detail || 'intenta de nuevo'));
    } else {
      const data = await res.json();
      addAgentMsg(data.message, currentAgent, data.agent_type);
      if (currentAgent.id === 'supervisor' && data.agent_type && data.agent_type !== 'supervisor') {
        const badge = document.createElement('div');
        badge.className = 'msg';
        badge.innerHTML = `<div style="padding:0 36px"><div class="agent-badge">🧠 Supervisor → ${agentTypeLabel(data.agent_type)} · ${data.latency_ms ? Math.round(data.latency_ms) + 'ms' : ''}</div></div>`;
        document.getElementById('msgs').appendChild(badge);
        document.getElementById('msgs').scrollTop = 99999;
      }
    }
  } catch (e) {
    hideTyping();
    addSys('⚠️ Sin conexión con el servidor. Verifica tu conexión.');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('suggestions').style.display = 'flex';
  field.focus();
}

document.getElementById('inputField').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('inputField').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

buildTabs();
const ag = currentAgent;
document.getElementById('chatAv').textContent = ag.av;
document.getElementById('chatName').textContent = ag.name;
document.getElementById('chatSub').textContent = ag.sub;
document.getElementById('chatTag').textContent = ag.tag;
document.getElementById('ctxText').textContent = ag.ctx;
addAgentMsg(ag.welcome, ag);
buildSuggestions(ag);
</script>
</body>
</html>
