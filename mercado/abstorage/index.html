<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABStorage · Vortex AI Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:    #f6f2ec;
  --bg2:   #ede8e0;
  --bg3:   #e5dfd5;
  --white: #fdfcfa;
  --panel: #ffffff;
  --bdr:   #dbd4c8;
  --bdr2:  #ccc3b4;
  --ink:   #18120c;
  --ink2:  #3d3020;
  --ink3:  #7a6a55;
  --ink4:  #b0a090;
  --ink5:  #d5cdc0;

  --c1: #1a5c3a; --d1: rgba(26,92,58,.08);   /* SEO — forest green   */
  --c2: #1a3d6b; --d2: rgba(26,61,107,.08);  /* Lead — deep navy     */
  --c3: #6b2a1a; --d3: rgba(107,42,26,.08);  /* Appt — terracotta    */
  --c4: #5c1a3a; --d4: rgba(92,26,58,.08);   /* Review — deep rose   */
  --c5: #3a1a6b; --d5: rgba(58,26,107,.08);  /* Follow — indigo      */
  --c6: #1a5060; --d6: rgba(26,80,96,.08);   /* FAQ — teal           */
  --c7: #4a3a1a; --d7: rgba(74,58,26,.08);   /* Widget — umber       */

  --serif: 'Playfair Display', serif;
  --sans:  'DM Sans', sans-serif;
  --mono:  'DM Mono', monospace;
}

html, body { height:100%; overflow:hidden; background:#e0d8cc; font-family:var(--sans); color:var(--ink); }

/* ── PHONE ── */
.phone {
  width:100%; height:100%; max-width:390px; margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--bg); position:relative; overflow:hidden;
  box-shadow: 0 0 60px rgba(0,0,0,.3);
}

/* ── STATUS BAR ── */
.sbar {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 16px 4px; background:var(--white);
  border-bottom:1px solid var(--bdr); flex-shrink:0;
  font-family:var(--mono); font-size:10px; color:var(--ink4);
}
.sbar-t { font-size:11px; font-weight:500; color:var(--ink2); }
.sbar-brand { font-family:var(--serif); font-size:12px; font-weight:700; color:var(--ink2); letter-spacing:-.01em; }

/* ── APPBAR ── */
.appbar {
  background:var(--white); border-bottom:1px solid var(--bdr);
  padding:9px 14px 10px; flex-shrink:0;
}
.appbar-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo { display:flex; align-items:center; gap:9px; }
.logo-mark {
  width:30px; height:30px; border-radius:8px;
  background:var(--ink); color:var(--white);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:10px; font-weight:700; letter-spacing:-.01em;
}
.logo-name { font-family:var(--serif); font-weight:700; font-size:15px; color:var(--ink); }
.logo-sub  { font-family:var(--mono); font-size:8px; color:var(--ink4); margin-top:1px; }
.live-pill {
  display:flex; align-items:center; gap:5px;
  background:var(--bg2); border:1px solid var(--bdr);
  border-radius:20px; padding:3px 10px;
  font-family:var(--mono); font-size:9px; color:var(--ink3);
}
.ldot { width:5px; height:5px; border-radius:50%; background:var(--c1); animation:ld 1.8s ease-in-out infinite; }
@keyframes ld { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Progress */
.prog { display:flex; gap:3px; margin-bottom:7px; }
.pseg {
  flex:1; height:2px; border-radius:2px;
  background:var(--bdr2); overflow:hidden; position:relative;
}
.pfill { position:absolute; left:0; top:0; height:100%; width:0; border-radius:2px; }
.pseg.done .pfill { width:100%; }
.pseg.active .pfill { animation:pf var(--d,10s) linear forwards; }
@keyframes pf { to { width:100%; } }

/* Agent chips */
.chips { display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  display:flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px;
  font-family:var(--mono); font-size:8px;
  border:1px solid var(--bdr); background:var(--bg);
  color:var(--ink4); white-space:nowrap; flex-shrink:0;
  cursor:pointer; transition:all .25s;
}
.chip.active {
  border-color:var(--ac); color:var(--ac);
  background:color-mix(in srgb, var(--ac) 8%, white);
}
.chipdot { width:4px; height:4px; border-radius:50%; background:var(--ac); }

/* ── SCENE WRAP ── */
.scene-wrap { flex:1; min-height:0; position:relative; overflow:hidden; }

/* ── CINEMATIC OVERLAY ── */
.cin {
  position:absolute; inset:0; z-index:200;
  background:var(--white);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:28px 24px;
  opacity:0; pointer-events:none; transition:opacity .35s;
}
.cin.show { opacity:1; pointer-events:all; }
.cin-num {
  font-family:var(--mono); font-size:9px; color:var(--ink4);
  letter-spacing:.15em; text-transform:uppercase;
}
.cin-line { width:36px; height:1px; background:var(--bdr2); }
.cin-name {
  font-family:var(--serif); font-size:26px; font-weight:900;
  color:var(--ink); letter-spacing:-.02em; text-align:center; line-height:1.1;
}
.cin-desc {
  font-size:11.5px; color:var(--ink3); text-align:center;
  line-height:1.65; max-width:270px;
}
.cin-pain {
  font-family:var(--mono); font-size:10px; color:var(--ink3);
  border-left:2px solid var(--ink4); padding:6px 0 6px 12px;
  max-width:280px; line-height:1.6; font-style:italic;
  margin-top:4px;
}

/* ── SCENES ── */
.scene {
  position:absolute; inset:0; display:flex; flex-direction:column;
  opacity:0; transform:translateX(14px);
  pointer-events:none; transition:opacity .4s ease, transform .4s ease;
}
.scene.on { opacity:1; transform:translateX(0); pointer-events:all; }

/* Scene header */
.shdr {
  padding:10px 14px 9px; border-bottom:1px solid var(--bdr);
  background:var(--white); flex-shrink:0;
  display:flex; align-items:center; gap:9px;
}
.shdr-av {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--sans); font-size:12px; font-weight:600;
  border:2px solid var(--bdr);
}
.shdr-name { font-family:var(--sans); font-weight:600; font-size:13px; color:var(--ink); }
.shdr-sub  { font-size:10px; color:var(--ink4); font-family:var(--mono); }
.shdr-tag  {
  margin-left:auto; font-family:var(--mono); font-size:8.5px; color:var(--ink4);
  background:var(--bg2); border:1px solid var(--bdr);
  border-radius:20px; padding:2px 8px; white-space:nowrap; flex-shrink:0;
}

/* Pain banner */
.pain-banner {
  padding:6px 14px; border-bottom:1px solid var(--bdr);
  background:var(--bg); flex-shrink:0;
  display:flex; align-items:center; gap:7px;
  font-family:var(--mono); font-size:9px; color:var(--ink3);
}
.pbdot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

/* Messages */
.msgs {
  flex:1; overflow-y:auto; padding:11px 12px 8px;
  display:flex; flex-direction:column; gap:8px; scrollbar-width:none;
}
.msgs::-webkit-scrollbar { display:none; }

.msg { display:flex; gap:7px; opacity:0; transform:translateY(5px); animation:mup .32s ease forwards; }
@keyframes mup { to { opacity:1; transform:translateY(0); } }
.msg.r { flex-direction:row-reverse; }

.mav {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; font-family:var(--sans);
  border:1.5px solid var(--bdr); flex-shrink:0; margin-top:1px;
}
.mcont { max-width:80%; display:flex; flex-direction:column; gap:3px; }
.msg.r .mcont { align-items:flex-end; }
.msend { font-family:var(--mono); font-size:8px; color:var(--ink5); padding:0 2px; }

.mb {
  padding:8px 12px; border-radius:12px;
  font-size:12.5px; line-height:1.55; border:1px solid var(--bdr);
}
.msg.r .mb { background:var(--ink); color:#f0ece6; border-radius:12px 2px 12px 12px; border-color:var(--ink); }
.msg.l .mb { border-radius:2px 12px 12px 12px; background:var(--white); }

.sys-note {
  text-align:center; font-family:var(--mono); font-size:9px;
  color:var(--ink4); background:var(--bg2); border:1px solid var(--bdr);
  border-radius:6px; padding:4px 10px; width:100%;
}
.pill {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 8px; border-radius:20px;
  font-size:8.5px; font-family:var(--mono); border:1px solid;
}

/* Card */
.card {
  background:var(--bg); border:1px solid var(--bdr);
  border-radius:10px; padding:9px 11px;
}
.card-title { font-family:var(--sans); font-weight:700; font-size:11px; margin-bottom:6px; }
.card-row {
  display:flex; justify-content:space-between;
  padding:3px 0; border-bottom:1px solid var(--bdr); font-size:10px;
}
.card-row:last-child { border-bottom:none; }
.card-k { color:var(--ink4); font-family:var(--mono); font-size:9px; }
.card-v { color:var(--ink); font-weight:500; }
.card-v.hi { font-weight:700; }

/* Review card */
.rev-card { background:var(--bg); border:1px solid var(--bdr); border-radius:10px; padding:9px 11px; }
.rev-stars { font-size:13px; margin-bottom:4px; }
.rev-text  { font-size:11px; color:var(--ink3); line-height:1.5; font-style:italic; margin-bottom:4px; }
.rev-auth  { font-family:var(--mono); font-size:8px; color:var(--ink4); }

/* SEO body */
.seo-body {
  flex:1; overflow-y:auto; padding:11px 12px 8px;
  display:flex; flex-direction:column; gap:8px; scrollbar-width:none;
}
.seo-body::-webkit-scrollbar { display:none; }
.seo-card {
  background:var(--white); border:1px solid var(--bdr);
  border-radius:10px; padding:10px 12px;
  opacity:0; animation:mup .4s ease forwards;
}
.sc-lbl { font-family:var(--mono); font-size:8px; color:var(--ink4); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }

.kw-row {
  display:flex; align-items:center; gap:6px;
  padding:4px 0; border-bottom:1px solid var(--bdr); font-size:10.5px;
}
.kw-row:last-child { border-bottom:none; }
.kw-t  { flex:1; color:var(--ink2); font-size:10px; line-height:1.3; }
.kw-bar { width:44px; height:3px; background:var(--bdr2); border-radius:2px; overflow:hidden; }
.kw-fill { height:100%; border-radius:2px; width:0; transition:width 1.3s ease; }
.kw-pos { font-family:var(--mono); font-size:11px; font-weight:500; min-width:22px; text-align:right; }

.ai-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 0; border-bottom:1px solid var(--bdr);
}
.ai-row:last-child { border-bottom:none; }
.ai-name { font-family:var(--mono); font-size:10px; color:var(--ink2); }
.ai-n    { font-family:var(--serif); font-size:18px; font-weight:900; }
.ai-d    { font-family:var(--mono); font-size:9px; }

.gbp-post {
  background:var(--bg); border:1px solid var(--bdr);
  border-left:3px solid var(--c1); border-radius:8px;
  padding:9px 11px; font-size:12px; line-height:1.7; color:var(--ink2);
}
.gbp-kw { font-weight:700; color:var(--c1); }
.gbp-meta { font-family:var(--mono); font-size:8px; color:var(--ink4); margin-bottom:6px; }

/* Typing */
.typing-mb {
  display:flex; align-items:center; gap:5px;
  padding:8px 12px; border-radius:2px 12px 12px 12px;
  background:var(--white); border:1px solid var(--bdr);
  font-size:9px; color:var(--ink4); font-family:var(--mono);
}
.typing span {
  width:4px; height:4px; border-radius:50%;
  background:var(--ink5); display:inline-block; animation:td .9s ease infinite;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes td { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

/* ── FINAL SUMMARY SCREEN ── */
.summary-scene {
  position:absolute; inset:0; display:flex; flex-direction:column;
  opacity:0; transform:translateY(14px);
  pointer-events:none; transition:opacity .5s ease, transform .5s ease;
  background:var(--white);
}
.summary-scene.on { opacity:1; transform:translateY(0); pointer-events:all; }

.sum-header {
  padding:16px 16px 12px; border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
.sum-eyebrow { font-family:var(--mono); font-size:9px; color:var(--ink4); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
.sum-title { font-family:var(--serif); font-size:22px; font-weight:900; color:var(--ink); line-height:1.1; margin-bottom:4px; }
.sum-sub { font-size:11px; color:var(--ink3); line-height:1.5; }

.sum-body { flex:1; overflow-y:auto; padding:10px 12px 12px; scrollbar-width:none; display:flex; flex-direction:column; gap:8px; }
.sum-body::-webkit-scrollbar { display:none; }

.sum-agent {
  background:var(--bg); border:1px solid var(--bdr);
  border-radius:10px; padding:10px 12px;
  display:flex; align-items:flex-start; gap:10px;
  opacity:0; animation:mup .4s ease forwards;
}
.sum-agent-icon {
  width:34px; height:34px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  border:1px solid var(--bdr);
}
.sum-agent-body { flex:1; min-width:0; }
.sum-agent-name { font-family:var(--sans); font-weight:700; font-size:12px; color:var(--ink); margin-bottom:2px; }
.sum-agent-desc { font-size:10.5px; color:var(--ink3); line-height:1.4; }
.sum-stat {
  font-family:var(--mono); font-size:9px; margin-top:4px;
  padding:2px 7px; border-radius:20px; display:inline-flex;
  align-items:center; gap:4px; border:1px solid;
}

/* CTA footer */
.sum-cta {
  flex-shrink:0; padding:12px 14px 14px;
  border-top:1px solid var(--bdr); background:var(--white);
}
.cta-line { font-family:var(--serif); font-size:15px; font-weight:700; color:var(--ink); margin-bottom:8px; text-align:center; line-height:1.3; }
.cta-row { display:flex; gap:8px; }
.cta-btn {
  flex:1; padding:11px 8px; border-radius:10px; text-align:center;
  font-family:var(--sans); font-size:12px; font-weight:600; cursor:pointer;
  border:1px solid var(--bdr); transition:all .2s;
}
.cta-btn.primary { background:var(--ink); color:var(--white); border-color:var(--ink); }
.cta-btn.secondary { background:var(--bg); color:var(--ink3); }

/* ── BOTTOM NAV ── */
.bnav {
  background:var(--white); border-top:1px solid var(--bdr);
  display:grid; grid-template-columns:repeat(8,1fr);
  flex-shrink:0; padding-bottom:env(safe-area-inset-bottom, 4px);
}
.bnav-btn {
  display:flex; flex-direction:column; align-items:center;
  padding:6px 2px 4px; cursor:pointer; transition:all .2s;
  border-top:2px solid transparent; gap:2px;
}
.bnav-btn.active { border-top-color:var(--bc); }
.bnav-icon { font-size:14px; line-height:1; }
.bnav-lbl  { font-family:var(--mono); font-size:6px; color:var(--ink4); text-align:center; line-height:1.2; }
.bnav-btn.active .bnav-lbl { color:var(--bc); }

/* Tap overlay */
.tap-area { position:absolute; inset:0; z-index:50; cursor:pointer; }
.pause-badge {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(248,244,238,.85); border:1px solid var(--bdr);
  border-radius:50%; width:52px; height:52px;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  opacity:0; pointer-events:none; transition:opacity .2s;
  backdrop-filter:blur(6px);
}
.pause-badge.show { opacity:1; }
</style>
</head>

</div>

let cur = 0, paused = false, sceneTO = null, clockInt = null;
const TOTAL = AG.length;
const wait = ms => new Promise(r => {
  let elapsed = 0;
  const tick = () => {
    if (elapsed >= ms) { r(); return; }
    setTimeout(() => { if (!paused) elapsed += 50; tick(); }, 50);
  };
  tick();
});

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function startClock() {
  const base = new Date(); base.setHours(9,14,0,0);
  if (clockInt) clearInterval(clockInt);
  clockInt = setInterval(() => {
    base.setSeconds(base.getSeconds()+1);
    const h = base.getHours(), m = String(base.getMinutes()).padStart(2,'0');
    document.getElementById('clockEl').textContent = h+':'+m;
  }, 1000);
}

function mkSeoCard(body, lbl) {

async function playChat(ag) {
  const cont = document.getElementById('msgs_'+ag.id);
  if (!cont || !ag.msgs) return;
  for (const msg of ag.msgs) {
    await wait(msg.r==='sys' ? 400 : 900);
    if (msg.r==='sys')  { addSys(cont, msg.text);       await wait(400); continue; }
    if (msg.r==='rev')  { addRev(cont, msg, ag);         await wait(500); continue; }
    if (msg.r==='u')    { addUser(cont, msg, ag);        await wait(500); continue; }
    addTyping(cont, ag);
    await wait(msg.card ? 1300 : 1050);
    removeTyping(ag.id);
    addAgent(cont, msg, ag);
    await wait(msg.card ? 2100 : 1700);
  }
}

  }
  if (msg.pill) {
    body+=`<div class="pill" style="color:${ag.hex};border-color:${ag.hex};background:${ag.dim}">${msg.pill}</div>`;
  }
  d.innerHTML=`<div class="mav" style="background:${ag.dim};color:${ag.hex};border-color:${ag.hex}33">${ag.icon}</div>
    <div class="mcont">${body}</div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}
function addTyping(c, ag) {
  const t=document.createElement('div');
  t.className='msg l'; t.id='tw_'+ag.id;
  t.innerHTML=`<div class="mav" style="background:${ag.dim};color:${ag.hex}">${ag.icon}</div>
    <div class="mcont"><div class="typing-mb"><div class="typing"><span></span><span></span><span></span></div> redactando...</div></div>`;
  c.appendChild(t); c.scrollTop=c.scrollHeight;
}
function removeTyping(id) { const t=document.getElementById('tw_'+id); if(t)t.remove(); }

// ── SUMMARY ───────────────────────────────────────────────────────────────────
async function playSummary() {
  const body = document.getElementById('sum-body');
  if (!body || body.children.length > 0) return;
  for (let i=0; i<SUMMARY.length; i++) {
    await wait(220);
    const ag = SUMMARY[i];
    const d = document.createElement('div');
    d.className='sum-agent';
    d.style.animationDelay = (i*.08)+'s';
    d.innerHTML=`<div class="sum-agent-icon" style="background:color-mix(in srgb,${ag.color} 8%,white);border-color:color-mix(in srgb,${ag.color} 20%,white)">${ag.icon}</div>
      <div class="sum-agent-body">
        <div class="sum-agent-name">${ag.name}</div>
        <div class="sum-agent-desc">${ag.desc}</div>
        <div class="sum-stat" style="color:${ag.color};border-color:${ag.color};background:color-mix(in srgb,${ag.color} 8%,white)">✓ ${ag.stat}</div>
      </div>`;
    body.appendChild(d);
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function deactivateAll() {
  AG.forEach(ag => {
    document.getElementById('seg_'+ag.id)?.classList.remove('active','done');
    document.getElementById('chip_'+ag.id)?.classList.remove('active');
    document.getElementById('nav_'+ag.id)?.classList.remove('active');
    document.getElementById('scene_'+ag.id)?.classList.remove('on');
  });
  document.getElementById('nav_sum')?.classList.remove('active');
  document.getElementById('scene_sum')?.classList.remove('on');
}

async function showCin(ag) {
  const ov = document.getElementById('cin');
  document.getElementById('cin-num').textContent  = ag.ecod ? `CAPA 2 · ${ag.ecod}` : `Agente ${String(ag.id+1).padStart(2,'0')} · 07`;
  document.getElementById('cin-name').textContent  = ag.cinName;
  document.getElementById('cin-name').style.color  = ag.hex;
  document.getElementById('cin-desc').textContent  = ag.cinDesc;
  document.getElementById('cin-pain').textContent  = ag.cinPain;
  ov.classList.add('show');
  await wait(2200);
  ov.classList.remove('show');
  await wait(380);
}

async function goTo(idx, skipCin=false) {
  deactivateAll();

  if (idx === 'sum') {
    document.getElementById('nav_sum').classList.add('active');
    document.getElementById('scene_sum').classList.add('on');
    // Mark all done
    AG.forEach(ag => {
      document.getElementById('seg_'+ag.id).classList.add('done');
    });
    playSummary();
    if (sceneTO) clearTimeout(sceneTO);
    return;
  }

  cur = idx;
  const ag = AG[idx];

  // Progress
  for (let i=0;i<idx;i++) document.getElementById('seg_'+i).classList.add('done');
  const seg = document.getElementById('seg_'+idx);
  seg.classList.add('active');
  seg.style.setProperty('--d', (ag.dur/1000)+'s');
  const fill = document.getElementById('fill_'+idx);
  fill.style.animation = 'none'; fill.offsetHeight;
  fill.style.animation = '';

  // Chip + nav
  document.getElementById('chip_'+idx)?.classList.add('active');
  document.getElementById('chip_'+idx)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  document.getElementById('nav_'+idx)?.classList.add('active');

  // Cinematic
  if (!skipCin) await showCin(ag);

  // Activate scene
  document.getElementById('scene_'+idx)?.classList.add('on');

  // Play content
  playScene(ag);

  // Schedule next
  if (sceneTO) clearTimeout(sceneTO);
  sceneTO = setTimeout(() => {
    const next = (cur+1 < TOTAL) ? cur+1 : 'sum';
    goTo(next);
  }, ag.dur);
}

function jumpTo(idx) {
  if (sceneTO) clearTimeout(sceneTO);
  goTo(idx, idx === cur);
}

// ── PAUSE / PLAY ──────────────────────────────────────────────────────────────
document.getElementById('tapArea').addEventListener('click', () => {
  paused = !paused;
  const badge = document.getElementById('pauseBadge');
  badge.textContent = paused ? '▶' : '⏸';
  badge.classList.toggle('show', paused);
  if (!paused) setTimeout(() => badge.classList.remove('show'), 800);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  build();
  startClock();
  goTo(0, true);
};
</script>
