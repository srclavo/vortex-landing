<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABStorages · Cotiza tu flete con DARA</title>
<meta name="description" content="Asistente digital de ABStorages Logistics Solutions. Cotiza tu flete en minutos.">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "ABStorage Logistics Solutions",
  "address": {"@type": "PostalAddress", "addressLocality": "Monterrey, México"},
  "telephone": "+52 81 3551 1638",
  "url": "https://abstorages.com",
  "openingHours": "Lun-Vie 9 AM - 6 PM CT"

</script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green: #3ab54a;
  --green-dark: #2d9a3c;
  --navy: #1a2744;
  --navy-light: #243461;
  --white: #ffffff;
  --gray: #f4f4f4;
  --text: #222222;
  --font: 'Montserrat', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  color: var(--text);
  overflow: hidden;
}

body {
  background: url('https://images.pexels.com/photos/16180770/pexels-photo-16180770.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat fixed;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, rgba(26,39,68,.72) 0%, rgba(26,39,68,.45) 50%, rgba(58,181,74,.35) 100%);
  z-index: 0;
}

/* ── HEADER ── */
.brand-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 18px 32px;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand-logo {
  font-size: 22px;
  font-weight: 900;
  color: white;
  letter-spacing: -.5px;
  text-decoration: none;
}

.brand-logo span { color: var(--green); }

.brand-tel {
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  background: rgba(255,255,255,.12);
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.25);
  backdrop-filter: blur(8px);
  transition: background .2s;
}

.brand-tel:hover { background: rgba(255,255,255,.22); }

/* ── MAIN LAYOUT ── */
.stage {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 90px 24px 60px;
}

.chat-card {
  width: 100%;
  max-width: 480px;
  height: min(640px, calc(100vh - 150px));
  background: white;
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: lift .6s ease-out;
}

@keyframes lift {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CHAT HEADER ── */
.chat-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 3px solid var(--green);
}

.chat-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(58,181,74,.4);
}

.chat-meta { flex: 1; }

.chat-name {
  color: white;
  font-size: 16px;
  font-weight: 800;
  line-height: 1.2;
}

.chat-status {
  color: rgba(255,255,255,.75);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
}

.chat-status::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(58,181,74,.3);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .5; }
}

/* ── MESSAGES ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 22px 18px;
  background: #f7f9fb;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d0d6dd; border-radius: 4px; }

.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.45;
  font-family: 'Open Sans', sans-serif;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: pop .25s ease-out;
}

@keyframes pop {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.bot {
  background: white;
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.msg.user {
  background: var(--navy);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.typing {
  background: white;
  align-self: flex-start;
  padding: 12px 18px;
  border-radius: 16px 16px 16px 4px;
  display: flex;
  gap: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.typing span {
  width: 7px; height: 7px;
  background: #aab2bb;
  border-radius: 50%;
  animation: blink 1.4s infinite ease-in-out both;
}

.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: .3; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── INPUT ── */
.chat-input-wrap {
  padding: 14px 16px;
  background: white;
  border-top: 1px solid #ebeef2;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  border: 1.5px solid #e3e7ec;
  border-radius: 22px;
  padding: 11px 16px;
  font-size: 14px;
  font-family: 'Open Sans', sans-serif;
  resize: none;
  max-height: 100px;
  outline: none;
  transition: border-color .2s;
}

.chat-input:focus { border-color: var(--green); }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--green);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .2s, transform .15s;
}

.send-btn:hover:not(:disabled) { background: var(--green-dark); transform: scale(1.05); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }
.send-btn svg { width: 20px; height: 20px; fill: white; }

/* ── FOOTER ── */
.brand-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  text-align: center;
  padding: 14px;
  color: rgba(255,255,255,.6);
  font-size: 11px;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.brand-footer a {
  color: rgba(255,255,255,.85);
  text-decoration: none;
  font-weight: 600;
}

.brand-footer a:hover { color: var(--green); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .brand-header { padding: 12px 18px; }
  .brand-logo { font-size: 18px; }
  .brand-tel { font-size: 12px; padding: 6px 12px; }
  .stage { padding: 70px 12px 50px; }
  .chat-card {
    height: calc(100vh - 130px);
    max-width: 100%;
    border-radius: 16px;
  }
  .chat-header { padding: 14px 16px; }
  .chat-avatar { width: 40px; height: 40px; font-size: 18px; }
  .chat-name { font-size: 15px; }
  .brand-footer { font-size: 10px; padding: 10px; }
}
</style>
</head>
<body>

<header class="brand-header">
  <a href="/" class="brand-logo">AB<span>Storages</span></a>
  <a href="tel:8135511638" class="brand-tel">📞 81 3551 1638</a>
</header>

<main class="stage">
  <div class="chat-card">
    <div class="chat-header">
      <div class="chat-avatar">🚛</div>
      <div class="chat-meta">
        <div class="chat-name">DARA · Asistente ABStorages</div>
        <div class="chat-status">En línea — responde al instante</div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-wrap">
      <textarea
        id="chatInput"
        class="chat-input"
        rows="1"
        placeholder="Escribe tu mensaje..."
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
        oninput="autoGrow(this)"
      ></textarea>
      <button id="sendBtn" class="send-btn" onclick="sendMessage()" title="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</main>

<footer class="brand-footer">
  Powered by <a href="https://vortexagents.ai" target="_blank" rel="noopener">Vortex AI Agents</a>
</footer>

<script>
const API = 'https://api.vortexagents.ai/api/v1/agents/dara/chat';
const API_KEY = 'abstorage_public_2026';
const BUSINESS_ID = 'abstorage';
const SESSION = 'abstorage-cotiza-' + Math.random().toString(36).slice(2, 11);

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function addMsg(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typing-indicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
  return t;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  const t = showTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify({ message: text, session_id: SESSION, business_id: BUSINESS_ID })
    });
    const data = await res.json();
    t.remove();
    addMsg('bot', data.message || 'Ocurrió un error, intenta de nuevo.');
  } catch (e) {
    t.remove();
    addMsg('bot', 'Error de conexión. Por favor intenta de nuevo en unos segundos.');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// Greeting on load
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addMsg('bot', '¡Hola! 👋 Soy DARA, asistente digital de ABStorages.\n\n¿Necesitas cotizar un flete? Cuéntame qué necesitas mover y te ayudo en minutos.');
    document.getElementById('chatInput').focus();
  }, 500);
});
</script>
</body>
</html>
