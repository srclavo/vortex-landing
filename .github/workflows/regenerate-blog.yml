name: Regenerate static blog pages

on:
  schedule:
    # Every day at 6:00 AM UTC (1 AM CDT) — after Neil publishes the night before
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger via Actions tab

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate static blog pages from API
        run: python3 blog/generate_static.py

      - name: Regenerate sitemap.xml
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from datetime import datetime
          API = "https://api.vortexagents.ai/api/v1/blog/posts"
          BASE = "https://vortexagents.ai"
          req = urllib.request.Request(API, headers={
              "X-API-Key": "vortex_public_2026",
              "User-Agent": "VortexSitemapGen/1.0",
          })
          posts = json.loads(urllib.request.urlopen(req, timeout=15).read().decode())
          today = datetime.utcnow().strftime("%Y-%m-%d")
          urls = [
              f'  <url><loc>{BASE}/</loc><changefreq>weekly</changefreq><priority>1.0</priority><lastmod>{today}</lastmod></url>',
              f'  <url><loc>{BASE}/blog/</loc><changefreq>daily</changefreq><priority>0.9</priority><lastmod>{today}</lastmod></url>',
              f'  <url><loc>{BASE}/morning-crew.html</loc><changefreq>monthly</changefreq><priority>0.7</priority></url>',
          ]
          for p in posts:
              pub = p.get("published_at", "")[:10]
              urls.append(f'  <url><loc>{BASE}/blog/{p["slug"]}.html</loc><changefreq>monthly</changefreq><priority>0.8</priority><lastmod>{pub}</lastmod></url>')
          sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' + '\n'.join(urls) + '\n</urlset>\n'
          open("sitemap.xml", "w").write(sitemap)
          print(f"Sitemap regenerated with {len(urls)} URLs")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/*.html sitemap.xml
          git diff --quiet --cached || git commit -m "auto: regenerate blog static pages from API"
          git push
